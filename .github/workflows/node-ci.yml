# Canonical REUSABLE CI-workflow voor Node-apps (NestJS + Next), npm én pnpm.
# Ligt in EduNexusBV/.github/.github/workflows/node-ci.yml; repos roepen 'm aan via de caller-stub.
# Geoptimaliseerd op Actions-minuten zonder de quality-gate te verzwakken.
name: node-ci

on:
  workflow_call:
    inputs:
      node-version:      { type: string,  default: '22' }
      package-manager:   { type: string,  default: 'pnpm' }   # 'pnpm' | 'npm'
      working-directory: { type: string,  default: '.' }
      run-tests:         { type: boolean, default: true }

# Superseded runs op dezelfde ref kosten geen minuten meer.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # Draft-PR's draaien niet (scheelt minuten tot de PR ready is).
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15            # runaway-job vangnet
    defaults:
      run: { working-directory: ${{ inputs.working-directory }} }
    steps:
      - uses: actions/checkout@v4
      - if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}   # key = lockfile-hash → geen stale-false-green
      - name: Install
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi
      - name: Checks (typecheck / lint / build / test)
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm -r --if-present typecheck
            pnpm -r --if-present lint
            pnpm -r --if-present build
            [ "${{ inputs.run-tests }}" = "true" ] && pnpm -r --if-present test || true
          else
            npm run typecheck --if-present
            npm run lint --if-present
            npm run build --if-present
            [ "${{ inputs.run-tests }}" = "true" ] && npm run test --if-present || true
          fi
